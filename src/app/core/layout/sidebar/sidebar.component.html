<div class="sidebar-header">
  <div class="sidebar-logo">
    <mat-icon class="logo-icon">sync</mat-icon>
    <span class="logo-skill">Skill</span><span class="logo-sync">Sync</span>
  </div>
</div>

<div class="sidebar-scroll-area">
  @if (isAdmin) {
    <div class="sidebar-section-label">Admin Console</div>
    <nav class="sidebar-nav">
      @for (item of adminNavItems; track item.page) {
        <button
          class="nav-item"
          [class.nav-item--active]="activePage === item.page"
          (click)="navigate.emit(item.page)"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      }
    </nav>
  }@else if(isMentor){
        <div class="sidebar-section-label">Mentor Console</div>
    <nav class="sidebar-nav">
      @for (item of mentorNavItems; track item.page) {
        <button
          class="nav-item"
          [class.nav-item--active]="activePage === item.page"
          (click)="navigate.emit(item.page)"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      }
    </nav>
}
@else {
    <nav class="sidebar-nav">
      @for (item of navItems; track item.page) {
        <button
          class="nav-item"
          [class.nav-item--active]="activePage === item.page"
          (click)="navigate.emit(item.page)"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      }
    </nav>
  }
</div>

<div class="sidebar-footer">
  <div class="sidebar-section-label">Account</div>
  
  <nav class="sidebar-nav">
    @for (item of accountItems; track item.page) {
      <button
        class="nav-item"
        [class.nav-item--active]="activePage === item.page"
        (click)="navigate.emit(item.page)"
      >
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
    }
    
    <button class="nav-item nav-item--logout" (click)="logout()">
      <mat-icon class="nav-icon">logout</mat-icon>
      <span>Logout</span>
    </button>
  </nav>
</div>
